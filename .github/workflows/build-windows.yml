name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix curl

      - name: The Mirage Trick (Fake Compiler Paths)
        run: |
          # إنشاء المجلدات الوهمية التي يبحث عنها السكريبت
          sudo mkdir -p /opt/mingw64/bin
          sudo mkdir -p /opt/mingw32/bin
          
          # عمل اختصارات للأدوات الحديثة ووضعها في المجلدات الوهمية
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-* /opt/mingw64/bin/
          sudo ln -sf /usr/bin/i686-w64-mingw32-* /opt/mingw32/bin/

      - name: Manual Dependency Fix (zlib patch)
        run: |
          dos2unix *.sh
          
          # تجاوز مشكلة تحميل zlib القديمة
          curl -L "https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz" -o temp_zlib.tar.gz
          tar -xzf temp_zlib.tar.gz
          mv zlib-1.3.1 zlib-1.2.8
          tar -czf zlib-1.2.8.tar.gz zlib-1.2.8
          rm -rf zlib-1.2.8 temp_zlib.tar.gz
          
          chmod +x *.sh

      - name: Run Build Script (64-bit)
        run: bash ./mingw64-cross-build.sh

      - name: Run Build Script (32-bit)
        run: bash ./mingw-cross-build.sh

      - name: Upload Compiled Installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
            sqliteodbc.exe
            sqliteodbc_w64.exe
