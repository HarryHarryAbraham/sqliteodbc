name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix curl

      - name: Manual Dependency Fix (The Patch)
        run: |
          # 1. تحويل صيغة الملفات
          dos2unix *.sh
          
          # 2. تحميل zlib من مصدر بديل ومضمون (GitHub)
          # سنحمل نسخة حديثة ومستقرة (1.3.1)
          curl -L "https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz" -o temp_zlib.tar.gz
          
          # 3. "التمويه": فك الضغط وتغيير اسم المجلد ليتوافق مع ما يتوقعه السكريبت (1.2.8)
          tar -xzf temp_zlib.tar.gz
          mv zlib-1.3.1 zlib-1.2.8
          tar -czf zlib-1.2.8.tar.gz zlib-1.2.8
          
          # تنظيف الملفات المؤقتة
          rm -rf zlib-1.2.8 temp_zlib.tar.gz
          
          # الآن السكريبت سيجد الملف zlib-1.2.8.tar.gz جاهزاً ولن يحاول تحميله
          chmod +x *.sh

      - name: Run Build Script (64-bit)
        run: bash ./mingw64-cross-build.sh

      - name: Run Build Script (32-bit)
        run: bash ./mingw-cross-build.sh

      - name: Upload Compiled Installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
            sqliteodbc.exe
            sqliteodbc_w64.exe
