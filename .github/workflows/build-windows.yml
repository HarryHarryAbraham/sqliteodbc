name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix

      - name: Fix Scripts (Patching Dead Links)
        run: |
          # تحويل صيغة الملفات لتتوافق مع لينكس
          dos2unix mingw64-cross-build.sh mingw-cross-build.sh
          
          # استبدال نسخة zlib الميتة (1.2.8) بالنسخة المستقرة الحالية (1.3.1)
          sed -i 's/zlib-1.2.8/zlib-1.3.1/g' mingw64-cross-build.sh
          sed -i 's/zlib-1.2.8/zlib-1.3.1/g' mingw-cross-build.sh
          
          # استبدال روابط http بروابط https لضمان أمان واستقرار التحميل
          sed -i 's/http:\/\/zlib.net/https:\/\/zlib.net/g' mingw64-cross-build.sh
          sed -i 's/http:\/\/zlib.net/https:\/\/zlib.net/g' mingw-cross-build.sh
          
          chmod +x mingw64-cross-build.sh mingw-cross-build.sh

      - name: Run Build Script (64-bit)
        run: bash ./mingw64-cross-build.sh

      - name: Run Build Script (32-bit)
        run: bash ./mingw-cross-build.sh

      - name: Upload Compiled Installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
            sqliteodbc.exe
            sqliteodbc_w64.exe
