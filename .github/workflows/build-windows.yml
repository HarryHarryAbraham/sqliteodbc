name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix curl binutils-mingw-w64-i686 gcc-mingw-w64-i686

      - name: Global Fixes & zlib Patch
        run: |
          find . -type f -name "*.sh" -exec dos2unix {} +
          
          # حل مشكلة zlib
          curl -L "https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz" -o temp_zlib.tar.gz
          tar -xzf temp_zlib.tar.gz
          mv zlib-1.3.1 zlib-1.2.8
          tar -czf zlib-1.2.8.tar.gz zlib-1.2.8
          rm -rf zlib-1.2.8 temp_zlib.tar.gz
          
          # تجهيز المسارات
          sudo mkdir -p /opt/mingw64/bin /opt/mingw32/bin
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-* /opt/mingw64/bin/
          sudo ln -sf /usr/bin/i686-w64-mingw32-* /opt/mingw32/bin/
          
          chmod +x *.sh

      - name: Build 64-bit Version
        run: bash ./mingw64-cross-build.sh

      - name: Recursive Patch & Build 32-bit
        run: |
          # 1. استبدال المترجمات (التعديل السابق)
          find . -type f -exec sed -i 's/x86_64-w64-mingw32/i686-w64-mingw32/g' {} +
          find . -type f -exec sed -i 's/mingw64/mingw32/g' {} +
          
          # 2. الحل الجذري للخطأ الأخير: تغيير المعمارية من i386 إلى i686
          # هذا سيسمح باستخدام __sync_fetch_and_add_4
          find . -type f -exec sed -i 's/-march=i386/-march=i686/g' {} +
          find . -type f -exec sed -i 's/-mtune=i386/-mtune=i686/g' {} +
          
          # 3. إعداد متغيرات البيئة
          export CC=i686-w64-mingw32-gcc
          export CXX=i686-w64-mingw32-g++
          export AR=i686-w64-mingw32-ar
          export RANLIB=i686-w64-mingw32-ranlib
          export LD=i686-w64-mingw32-ld
          
          # إزالة -m32 لتجنب أي تعارض
          find . -type f -name "mingw-cross-build.sh" -exec sed -i 's/-m32//g' {} +
          
          bash ./mingw-cross-build.sh

      - name: Upload Compiled Installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
             *.exe
