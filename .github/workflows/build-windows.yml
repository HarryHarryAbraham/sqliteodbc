name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix curl

      - name: Manual Dependency & Path Fix
        run: |
          # 1. تحويل صيغة الملفات
          dos2unix *.sh
          
          # 2. حل مشكلة zlib (التي نجحت في النسخة 64)
          curl -L "https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz" -o temp_zlib.tar.gz
          tar -xzf temp_zlib.tar.gz
          mv zlib-1.3.1 zlib-1.2.8
          tar -czf zlib-1.2.8.tar.gz zlib-1.2.8
          rm -rf zlib-1.2.8 temp_zlib.tar.gz
          
          # 3. تصحيح ملف 32 بت (إجباره على استخدام مترجم 32 بت الحقيقي)
          # استبدال x86_64 بـ i686 واستبدال mingw64 بـ mingw32
          sed -i 's/x86_64-w64-mingw32/i686-w64-mingw32/g' mingw-cross-build.sh
          sed -i 's/mingw64/mingw32/g' mingw-cross-build.sh
          
          # 4. خدعة المسارات الوهمية (للتأكد من عمل النسختين)
          sudo mkdir -p /opt/mingw64/bin /opt/mingw32/bin
          sudo ln -sf /usr/bin/x86_64-w64-mingw32-* /opt/mingw64/bin/
          sudo ln -sf /usr/bin/i686-w64-mingw32-* /opt/mingw32/bin/
          
          chmod +x *.sh

      - name: Run Build Script (64-bit)
        run: bash ./mingw64-cross-build.sh

      - name: Run Build Script (32-bit)
        run: bash ./mingw-cross-build.sh

      - name: Upload Compiled Installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
            *.exe
