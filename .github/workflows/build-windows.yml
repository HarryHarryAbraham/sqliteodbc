name: Build SQLite ODBC Driver (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # أضفنا أداة dos2unix لحل مشاكل توافق النصوص بين ويندوز ولينكس
          sudo apt-get install -y mingw-w64 nsis wget tar make dos2unix

      - name: Fix Scripts (Permissions & Line Endings)
        run: |
          # هذه الخطوة تضمن أن السكريبتات مقروءة بشكل صحيح لبيئة لينكس
          dos2unix mingw64-cross-build.sh mingw-cross-build.sh
          chmod +x mingw64-cross-build.sh mingw-cross-build.sh

      - name: Run Build Script (64-bit)
        run: bash ./mingw64-cross-build.sh

      - name: Run Build Script (32-bit)
        run: bash ./mingw-cross-build.sh
        # أزلنا تجاوز الأخطاء هنا لكي يتوقف العمل ونرى الخطأ بوضوح إذا حدث

      - name: Upload Compiled Installers
        if: always() # سيحاول رفع أي ملف تم إنجازه حتى لو فشلت إحدى الخطوات السابقة
        uses: actions/upload-artifact@v4
        with:
          name: SQLite-ODBC-Installers
          path: |
            sqliteodbc.exe
            sqliteodbc_w64.exe
